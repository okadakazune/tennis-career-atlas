name: Update ATP ranking data

on:
  schedule:
    # Every Monday 12:00 UTC — after ATP weekly ranking release
    - cron: "0 12 * * 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-rankings
  cancel-in-progress: false

jobs:
  update-rankings:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch latest ranking deltas
        env:
          BALLDONTLIE_API_KEY: ${{ secrets.BALLDONTLIE_API_KEY }}
        run: npm run data:update-latest

      - name: Build generated data
        run: npm run data:build

      - name: Verify production build
        run: npm run build

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            data/latest/ \
            scripts/config/player-id-map.json \
            src/data/*.json

          if git diff --staged --quiet; then
            echo "No data changes to commit."
            exit 0
          fi

          git commit -m "Update latest ATP ranking data"
          git push
